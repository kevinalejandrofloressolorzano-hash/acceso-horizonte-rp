<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Horizonte RP - Conectando</title>
    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            let target = params.get('url'); 

            if (target) {
                // Limpiamos espacios o caracteres raros que el bot pueda enviar
                target = target.trim();
                
                // Forzamos la redirección
                window.location.replace(target);
            } else {
                document.body.innerHTML = "<h1 style='color:white;text-align:center;font-family:sans-serif;margin-top:100px;'>❌ ERROR: ACCESO NO CONFIGURADO</h1>";
            }
        };
    </script>
</head>
<body style="background-color: #0b0b0b;">
    <h2 style="color: #198000; text-align: center; margin-top: 150px; font-family: sans-serif;">
        ENTRANDO A GREENVILLE DISFRUTA DE ESTA SESIÓN!...
    </h2>
</body>
</html>
